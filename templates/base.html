<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}台中榮總自動掛號系統{% endblock %}</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2872147871977405"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 暗色主題配色 - 統一棕色系 */
        :root {
            --dark-bg: #1a1a1a;
            --primary-brown: #a1887f;
            /* 主要棕色 - 統一使用自動驗證碼處理區塊的顏色 */
            --dark-brown: #8d6e63;
            /* 深棕色 - 懸停效果 */
            --light-brown: #bcaaa4;
            /* 淺棕色 - 次要元素 */
            --accent-brown: #a1887f;
            /* 強調色 - 保持一致 */
            --text-light: #f5f5f5;
            --text-muted: #bcaaa4;
            --card-bg: #2d2d2d;
            --border-color: #4a4a4a;
        }

        body {
            background-color: var(--dark-bg) !important;
            color: var(--text-light) !important;
        }

        .navbar {
            background-color: #353535 !important;
        }

        .navbar-brand {
            font-weight: bold;
            color: var(--text-light) !important;
        }

        .nav-link {
            color: var(--text-light) !important;
        }

        .nav-link:hover {
            color: var(--light-brown) !important;
        }

        .card {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-light) !important;
        }

        .card-header {
            background-color: #4f4f4f !important;
            color: var(--text-light) !important;
            border-bottom: 1px solid var(--border-color) !important;
        }

        .form-control {
            background-color: var(--dark-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-light) !important;
        }

        .form-control:focus {
            background-color: var(--dark-bg) !important;
            border-color: var(--accent-brown) !important;
            box-shadow: 0 0 0 0.2rem rgba(161, 136, 127, 0.25) !important;
            color: var(--text-light) !important;
        }

        .form-select {
            background-color: var(--dark-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-light) !important;
        }

        .form-select:focus {
            background-color: var(--dark-bg) !important;
            border-color: var(--accent-brown) !important;
            box-shadow: 0 0 0 0.2rem rgba(161, 136, 127, 0.25) !important;
        }

        .form-label {
            color: var(--text-light) !important;
        }

        .form-text {
            color: var(--text-muted) !important;
        }

        .btn-primary {
            background-color: #4f4643 !important;
            border-color: #4f4643 !important;
            color: var(--text-light) !important;
        }

        .btn-primary:hover {
            background-color: #3a342f !important;
            border-color: #3a342f !important;
        }

        .btn-success {
            background-color: #4f4643 !important;
            border-color: #4f4643 !important;
            color: var(--text-light) !important;
        }

        .btn-success:hover {
            background-color: #3a342f !important;
            border-color: #3a342f !important;
        }

        .btn-danger {
            background-color: #272422 !important;
            border-color: #272422 !important;
            color: var(--text-light) !important;
        }

        .btn-danger:hover {
            background-color: #1a1715 !important;
            border-color: #1a1715 !important;
        }

        .alert {
            margin-top: 1rem;
            border: 1px solid var(--border-color) !important;
        }

        .alert-success {
            background-color: rgba(79, 70, 67, 0.3) !important;
            border-color: #4f4643 !important;
            color: var(--text-light) !important;
        }

        .alert-info {
            background-color: rgba(161, 136, 127, 0.3) !important;
            border-color: var(--accent-brown) !important;
            color: var(--text-light) !important;
        }

        .alert-warning {
            background-color: rgba(139, 69, 19, 0.3) !important;
            border-color: #8b4513 !important;
            color: var(--text-light) !important;
        }

        .alert-danger {
            background-color: rgba(160, 82, 45, 0.3) !important;
            border-color: #a0522d !important;
            color: var(--text-light) !important;
        }

        .form-check-input:checked {
            background-color: var(--accent-brown) !important;
            border-color: var(--accent-brown) !important;
        }

        .form-check-input {
            background-color: var(--dark-bg) !important;
            border: 1px solid var(--border-color) !important;
        }

        .form-check-label {
            color: var(--text-light) !important;
        }

        .badge {
            color: var(--text-light) !important;
        }

        .bg-info {
            background-color: var(--accent-brown) !important;
        }

        .bg-success {
            background-color: #4f4643 !important;
        }

        .bg-primary {
            background-color: #4f4643 !important;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .text-primary {
            color: #d0c4c0 !important;
        }

        .log-container {
            max-height: 400px;
            overflow-y: auto;
            background-color: var(--dark-bg) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 0.375rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: var(--text-light) !important;
        }

        .container {
            color: var(--text-light) !important;
        }

        .bg-light {
            background-color: var(--card-bg) !important;
            color: var(--text-light) !important;
        }

        footer {
            background-color: var(--card-bg) !important;
            border-top: 1px solid var(--border-color) !important;
        }

        footer small {
            color: var(--text-muted) !important;
        }

        /* 自定義滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #4f4643;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a342f;
        }

        /* 輸入框 placeholder 顏色 */
        .form-control::placeholder {
            color: var(--text-muted) !important;
        }

        /* 日期選擇器月曆圖示顏色 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }

        /* 表格樣式 */
        .table {
            color: var(--text-light) !important;
        }

        .table-dark {
            background-color: var(--card-bg) !important;
        }

        /* 下拉選單 */
        .dropdown-menu {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
        }

        .dropdown-item {
            color: var(--text-light) !important;
        }

        .dropdown-item:hover {
            background-color: #4f4643 !important;
            color: var(--text-light) !important;
        }

        /* 額外的暗色主題樣式 */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--text-light) !important;
        }

        p,
        span,
        div {
            color: var(--text-light);
        }

        .small {
            color: var(--text-muted) !important;
        }

        /* 按鈕群組 */
        .btn-group .btn {
            border-color: var(--border-color) !important;
        }

        /* 按鈕間距調整 */
        .btn-group .btn+.btn {
            margin-left: 8px !important;
        }

        /* 輸入框群組 */
        .input-group-text {
            background-color: #4f4643 !important;
            border-color: var(--border-color) !important;
            color: var(--text-light) !important;
        }

        /* 分隔線 */
        hr {
            border-color: var(--border-color) !important;
        }

        /* 列表 */
        ul,
        ol {
            color: var(--text-light) !important;
        }

        li {
            color: var(--text-light) !important;
        }

        /* 強調文字 */
        strong,
        b {
            color: var(--light-brown) !important;
        }

        /* 連結 */
        a {
            color: var(--accent-brown) !important;
        }

        a:hover {
            color: var(--dark-brown) !important;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-hospital"></i> 台中榮總自動掛號系統
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('index') }}">
                    <i class="fas fa-home"></i> 首頁
                </a>
                <a class="nav-link" href="{{ url_for('view_logs') }}">
                    <i class="fas fa-file-alt"></i> 日誌
                </a>

                {% if current_user.is_authenticated %}
                <span class="navbar-text ms-3 text-muted border-start ps-3">
                    <i class="fas fa-user-circle"></i> {{ current_user.username }}
                </span>
                <a class="nav-link ms-2" href="{{ url_for('logout') }}">
                    <i class="fas fa-sign-out-alt"></i> 登出
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-3 mt-5">
        <div class="container">
            <small class="text-muted">
                台中榮總自動掛號系統
            </small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        // 顯示訊息
        function showMessage(message, type = 'info', autoHide = true) {
            const alertClass = type === 'error' ? 'alert-danger' : 'alert-success';
            const alertHtml = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#messages').html(alertHtml);

            // 只有在 autoHide 為 true 且不是錯誤訊息時才自動隱藏
            if (autoHide && type !== 'error') {
                setTimeout(() => {
                    $('#messages').empty();
                }, 8000); // 延長到8秒
            }
        }

        // AJAX 錯誤處理
        $(document).ajaxError(function (event, xhr, settings, thrownError) {
            showMessage('請求失敗: ' + thrownError, 'error');
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
